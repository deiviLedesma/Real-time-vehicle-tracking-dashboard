spring.application.name=demo
server.port=8081
# Configuraci\u00f3n de la consola H2 para que puedas ver las tablas en el navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuraci\u00f3n de la conexi\u00f3n (Base de datos en memoria)
spring.datasource.url=jdbc:h2:mem:minadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate: Crea las tablas autom\u00e1ticamente basado en tus Entity Classes
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
